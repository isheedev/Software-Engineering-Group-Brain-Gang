<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ProjectVault</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body class="register-body">
    <header>
        <div class="header-container">
            <a href="index.html" style="text-decoration:none;">
                <h1 class="logo">Project<span>Vault</span></h1>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h2>Create your account</h2>
            <p class="auth-subtitle">Start organizing and showcasing your projects</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="jane@example.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="At least 6 characters" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" placeholder="Re-enter password" minlength="6" required>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ProjectVault — CSC 4350 Group 1</p>
        <p>Alexander Khauv &middot; Tahia Shawkat &middot; Ismael Fong</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
